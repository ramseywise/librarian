services:
  api:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./wiki:/app/wiki:ro
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1

  ui:
    build:
      context: app/ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api
